<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Leads CRM — Moiz Ahmad</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#3b82f6;--brand-dark:#2563eb;--brand-light:#eff6ff;
  --success:#16a34a;--warning:#f59e0b;--danger:#ef4444;--purple:#7c3aed;
  --bg:#f0f4f8;--surface:#ffffff;--border:#e2e8f0;--border-light:#f1f5f9;
  --text:#1e293b;--text-2:#374151;--text-3:#64748b;--text-4:#94a3b8;
  --sidebar-bg:#0f172a;--sidebar-hover:#1e293b;--sidebar-active:#1d3557;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.08);
  --transition:.18s cubic-bezier(.4,0,.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px;line-height:1.5}

/* ===== SIDEBAR ===== */
#sidebar{
  width:240px;min-width:240px;background:var(--sidebar-bg);
  color:#cbd5e1;display:flex;flex-direction:column;
  transition:transform var(--transition);z-index:200;
  box-shadow:2px 0 20px rgba(0,0,0,.25);
}
#sidebar .logo{
  padding:22px 20px 18px;
  background:linear-gradient(135deg,#1d3557 0%,#0f172a 100%);
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
#sidebar .logo::before{
  content:'';position:absolute;top:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(59,130,246,.12);
}
#sidebar .logo h1{font-size:15px;font-weight:800;color:#fff;line-height:1.2;letter-spacing:-.2px}
#sidebar .logo p{font-size:11px;color:#60a5fa;margin-top:3px;opacity:.8}
#sidebar nav{padding:10px 0;flex:1;overflow-y:auto}
#sidebar nav a{
  display:flex;align-items:center;gap:11px;padding:10px 20px;
  color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;
  cursor:pointer;transition:all var(--transition);
  border-left:3px solid transparent;border-radius:0 8px 8px 0;margin:1px 8px 1px 0;
}
#sidebar nav a:hover{background:var(--sidebar-hover);color:#e2e8f0;border-left-color:#475569}
#sidebar nav a.active{background:linear-gradient(90deg,#1d3a6e,#1e3a5f);color:#60a5fa;border-left-color:var(--brand);box-shadow:0 2px 8px rgba(59,130,246,.15)}
#sidebar nav a .icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
#sidebar nav .nav-section{padding:16px 20px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#334155}
#sidebar .sidebar-footer{
  padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);
  font-size:11px;color:#475569;background:rgba(0,0,0,.2);
}
#sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:199;backdrop-filter:blur(2px);
}
#sidebar-overlay.show{display:block}

/* ===== TOPBAR ===== */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  box-shadow:0 1px 0 var(--border),0 2px 8px rgba(0,0,0,.04);
}
#topbar .topbar-left{display:flex;align-items:center;gap:12px}
#hamburger{
  display:none;background:none;border:none;cursor:pointer;
  padding:6px;border-radius:var(--radius-sm);color:var(--text-3);
  transition:all var(--transition);
}
#hamburger:hover{background:var(--border-light);color:var(--text)}
#hamburger svg{display:block}
#topbar h2{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
#topbar .actions{display:flex;gap:8px;align-items:center}
#content{flex:1;overflow-y:auto;padding:24px}

/* ===== STAT CARDS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{
  background:var(--surface);border-radius:var(--radius);padding:20px;
  border:1px solid var(--border);box-shadow:var(--shadow);
  transition:transform var(--transition),box-shadow var(--transition);
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;right:0;width:80px;height:80px;
  border-radius:50%;opacity:.06;transform:translate(20px,-20px);
}
.stat-card.blue::before{background:#3b82f6}
.stat-card.green::before{background:#16a34a}
.stat-card.orange::before{background:#f59e0b}
.stat-card.purple::before{background:#7c3aed}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-card .label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px}
.stat-card .value{font-size:32px;font-weight:800;color:var(--text);line-height:1}
.stat-card .sub{font-size:12px;color:var(--text-3);margin-top:6px}
.stat-card.green .value{color:var(--success)}
.stat-card.blue .value{color:var(--brand)}
.stat-card.orange .value{color:#d97706}
.stat-card.purple .value{color:var(--purple)}

/* ===== CHART CARDS ===== */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{
  background:var(--surface);border-radius:var(--radius);padding:22px;
  border:1px solid var(--border);box-shadow:var(--shadow);
}
.chart-card h3{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--text);text-transform:uppercase;letter-spacing:.4px}
.chart-card canvas{max-height:200px}

/* ===== CARDS & TABLES ===== */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.card-header{
  padding:16px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border-light);
  background:linear-gradient(to bottom,#fafbfc,var(--surface));
}
.card-header h3{font-size:14px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse}
thead th{
  padding:11px 16px;text-align:left;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);
  background:#f8fafc;border-bottom:2px solid var(--border);
  white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border-light);transition:background var(--transition)}
tbody tr:hover{background:#f8fafc}
tbody td{padding:11px 16px;font-size:13px;color:var(--text-2);vertical-align:middle}
.table-overflow{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-new{background:#dbeafe;color:#1e40af}
.badge-contacted{background:#dcfce7;color:#14532d}
.badge-replied{background:#fef9c3;color:#713f12}
.badge-meeting{background:#f3e8ff;color:#5b21b6}
.badge-proposal{background:#ffedd5;color:#92400e}
.badge-won{background:#d1fae5;color:#064e3b}
.badge-lost{background:#fee2e2;color:#7f1d1d}
.badge-nurture{background:#e0f2fe;color:#0c4a6e}
.score-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:800;gap:2px}
.score-high{background:#dcfce7;color:#14532d}
.score-med{background:#fef9c3;color:#713f12}
.score-low{background:#fee2e2;color:#7f1d1d}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:var(--radius-sm);font-size:13px;font-weight:600;
  cursor:pointer;border:none;transition:all var(--transition);
  text-decoration:none;white-space:nowrap;letter-spacing:.1px;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.btn-primary:hover{background:var(--brand-dark);box-shadow:0 4px 12px rgba(59,130,246,.4)}
.btn-secondary{background:var(--surface);color:var(--text-2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border-light);border-color:#cbd5e1}
.btn-success{background:var(--success);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.25)}
.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff;padding:4px 10px;font-size:12px;box-shadow:0 2px 6px rgba(239,68,68,.25)}
.btn-sm{padding:5px 12px;font-size:12px}

/* ===== FILTER BAR ===== */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{
  padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;background:var(--surface);outline:none;color:var(--text);
  transition:border-color var(--transition),box-shadow var(--transition);
  font-family:inherit;
}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.filter-bar input{min-width:200px}

/* ===== PIPELINE ===== */
.pipeline-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;min-height:calc(100vh - 200px)}
.pipeline-board::-webkit-scrollbar{height:5px}
.pipeline-col{min-width:220px;background:#f8fafc;border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.pipeline-col-header{
  padding:14px 16px;font-size:11px;font-weight:800;text-transform:uppercase;
  letter-spacing:.8px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  border-radius:var(--radius) var(--radius) 0 0;
}
.pipeline-cards{padding:10px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:600px}
.pipeline-card{
  background:var(--surface);border-radius:var(--radius-sm);padding:14px;
  border:1px solid var(--border);cursor:pointer;
  transition:all var(--transition);
}
.pipeline-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);border-color:#c7d2fe}
.pipeline-card .company{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text)}
.pipeline-card .category{font-size:11px;color:var(--text-3)}
.pipeline-card .contact{font-size:11px;color:var(--text-2);margin-top:6px;display:flex;align-items:center;gap:4px}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(15,23,42,.6);z-index:1000;
  align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:16px;width:700px;
  max-width:100%;max-height:92vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{
  padding:22px 26px 18px;border-bottom:1px solid var(--border-light);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.modal-header h3{font-size:17px;font-weight:800;color:var(--text)}
.modal-body{padding:26px}
.modal-footer{
  padding:16px 26px;border-top:1px solid var(--border-light);
  display:flex;justify-content:flex-end;gap:8px;
  position:sticky;bottom:0;background:var(--surface);
}
.close-btn{
  background:var(--border-light);border:none;font-size:16px;cursor:pointer;
  color:var(--text-3);width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);
}
.close-btn:hover{background:#fee2e2;color:var(--danger)}

/* ===== FORMS ===== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{
  padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:13px;font-family:inherit;outline:none;color:var(--text);
  transition:border-color var(--transition),box-shadow var(--transition);
  background:var(--surface);
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.form-group textarea{resize:vertical;min-height:80px}

/* ===== ACTIVITY LOG ===== */
.activity-item{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border-light)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:10px;height:10px;border-radius:50%;background:var(--brand);margin-top:4px;flex-shrink:0;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.activity-dot.green{background:var(--success);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.activity-dot.orange{background:var(--warning);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.activity-dot.red{background:var(--danger);box-shadow:0 0 0 3px rgba(239,68,68,.15)}
.activity-dot.purple{background:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.activity-text{font-size:13px;line-height:1.6;color:var(--text-2)}
.activity-time{font-size:11px;color:var(--text-4);margin-top:2px}

/* ===== GENERATOR ===== */
.gen-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:22px;margin-bottom:16px;box-shadow:var(--shadow)}
.gen-card h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text)}
.gen-result-row{
  display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border-light);flex-wrap:wrap;
}
.gen-result-row:last-child{border-bottom:none}
.gen-result-row .company{font-weight:700;font-size:13px;min-width:150px;color:var(--text)}
.gen-result-row .meta{font-size:12px;color:var(--text-3);flex:1}

/* ===== EMAIL TRACKER ===== */
.email-status{display:flex;gap:6px;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.dot-green{background:var(--success)}
.dot-yellow{background:var(--warning)}
.dot-red{background:var(--danger)}
.dot-gray{background:#9ca3af}
.dot-blue{background:var(--brand)}

/* ===== DETAIL PANEL ===== */
.detail-section{margin-bottom:22px}
.detail-section h4{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-light)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-item{font-size:13px;background:#f8fafc;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.detail-item .dk{color:var(--text-3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.detail-item .dv{font-weight:600;color:var(--text)}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--sidebar-bg);
  color:#fff;padding:13px 20px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;z-index:9999;opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:8px;
  transform:translateY(8px);
}
.toast.show{opacity:1;transform:translateY(0)}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ===== TABS ===== */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:22px;overflow-x:auto}
.tab{
  padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--text-3);
  white-space:nowrap;transition:all var(--transition);
}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}

/* ===== EMPTY STATE ===== */
.empty-state{
  text-align:center;padding:56px 24px;color:var(--text-4);font-size:14px;
}
.empty-state::before{content:'🔍';display:block;font-size:36px;margin-bottom:12px}

/* ===== RESPONSIVE BREAKPOINTS ===== */
@media(max-width:1200px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .charts-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:900px){
  #sidebar{
    position:fixed;left:0;top:0;bottom:0;
    transform:translateX(-100%);
    box-shadow:none;
  }
  #sidebar.mobile-open{
    transform:translateX(0);
    box-shadow:4px 0 30px rgba(0,0,0,.4);
  }
  #hamburger{display:flex}
  #main{width:100%}
  #content{padding:16px}
  #topbar{padding:0 16px;height:56px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .charts-grid{grid-template-columns:1fr;gap:12px}
  .filter-bar input{min-width:140px}
  .form-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{padding:14px}
  .stat-card .value{font-size:26px}
  #content{padding:12px}
  .modal{border-radius:12px 12px 0 0;margin-top:auto;max-height:95vh}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal-body{padding:18px}
  .modal-header{padding:16px 18px 14px}
  .modal-footer{padding:12px 18px}
  .gen-result-row{flex-direction:column;align-items:flex-start;gap:6px}
  .gen-result-row .meta{min-width:0}
  .card-header{flex-wrap:wrap;gap:8px}
  thead{display:none}
  tbody tr{
    display:grid;grid-template-columns:1fr 1fr;
    gap:4px 8px;padding:12px;
    border:1px solid var(--border);border-radius:var(--radius-sm);
    margin-bottom:8px;background:var(--surface);
  }
  tbody td{
    padding:2px 4px;max-width:none;white-space:normal;
    font-size:12px;
  }
  tbody td:first-child{grid-column:1/-1;font-weight:700}
  table{display:block}
  thead,tbody,tr,td{display:block}
  .table-overflow{overflow:visible}
  .btn{padding:7px 12px;font-size:12px}
  .filter-bar{gap:8px}
  .filter-bar input,.filter-bar select{font-size:12px;padding:7px 10px}
}
/* AUTOMATION */
.rule-card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:18px;margin-bottom:12px;display:flex;align-items:flex-start;gap:14px}
.rule-icon{font-size:22px;width:36px;height:36px;background:#eff6ff;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rule-body{flex:1}
.rule-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:3px}
.rule-desc{font-size:12px;color:#64748b;line-height:1.5}
.rule-meta{font-size:11px;color:#94a3b8;margin-top:5px}
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:11px;transition:.2s}
.toggle input:checked+.toggle-slider{background:#3b82f6}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.auto-log{background:#0f172a;border-radius:10px;padding:16px;font-family:monospace;font-size:12px;color:#94a3b8;max-height:220px;overflow-y:auto;margin-top:0}
.auto-log .al-line{padding:2px 0;border-bottom:1px solid #1e293b}
.auto-log .al-green{color:#34d399}
.auto-log .al-yellow{color:#fde68a}
.auto-log .al-red{color:#f87171}
.auto-log .al-blue{color:#60a5fa}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot.on{background:#34d399}
.status-dot.off{background:#64748b}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <h1>IT Leads CRM</h1>
    <p>Moiz Ahmad · moizahmad1604</p>

function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    idle:    ['🔄','Syncing…',  '#94a3b8'],
    syncing: ['⏳','Saving…',   '#f59e0b'],
    ok:      ['☁️','Synced',    '#16a34a'],
    error:   ['❌','Sync error','#ef4444'],
    off:     ['💾','Local only','#64748b']
  };
  const [icon, text, color] = map[state] || map.off;
  el.textContent = `${icon} ${text}`;
  el.style.color = color;
}

async function pushToSupabase() {
  if (supaSyncing) return;
  supaSyncing = true;
  setSyncStatus('syncing');
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/crm_leads`, {
      method: 'POST',
      headers: { ...supaHeaders(), 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(leads.map(toDb))
    });
    setSyncStatus(res.ok ? 'ok' : 'error');
    if (!res.ok) console.warn('Supabase upsert error:', await res.text());
  } catch(e) {
    setSyncStatus('error');
    console.warn('Supabase push failed:', e);
  }
  supaSyncing = false;
}

async function loadFromSupabase() {
  setSyncStatus('idle');
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/crm_leads?select=*&order=id.asc`, {
      headers: supaHeaders()
    });
    if (!res.ok) { setSyncStatus('error'); return false; }
    const rows = await res.json();
    if (rows.length > 0) {
      leads = rows.map(fromDb);
      localStorage.setItem('crm_leads', JSON.stringify(leads));
    } else {
      // DB is empty on first run — seed it with local data
      await pushToSupabase();
    }
    setSyncStatus('ok');
    return true;
  } catch(e) {
    setSyncStatus('error');
    console.warn('Supabase load failed:', e);
    return false;
  }
}

async function initData() {
  // 1. Show local data immediately (fast)
  const stored = localStorage.getItem('crm_leads');
  const storedActs = localStorage.getItem('crm_activities');
  if (stored) {
    leads = JSON.parse(stored);
  } else {
    const now = new Date('2026-06-21').toISOString();
    leads = SEED_LEADS.map(l => ({
      ...l,
      status: 'New Lead', notes: '', activities: [],
      emailSent: l.wave === 1, emailOpened: false,
      emailReplied: false, emailBounced: false,
      lastContact: l.wave === 1 ? now : null,
      createdAt: now, linkedin: l.linkedin || ''
    }));
    localStorage.setItem('crm_leads', JSON.stringify(leads));
  }
  activities = storedActs ? JSON.parse(storedActs) : [];
  if (!activities.length) {
    log('system','CRM initialized — 108 IT leads loaded from campaign','green');
    log('system','21 Wave 1 emails sent (Samsara, Joby, Tempus, Zendesk…)','green');
    log('system','Wave 2 & 3 pending email verification','orange');
  }
  updateSidebar();
  setSyncStatus('idle');

  // 2. Load live data from Supabase in background
  const loaded = await loadFromSupabase();
  if (loaded) {
    updateSidebar();
    if (currentView) showView(currentView);
  }

  setTimeout(()=>{
    runAutoPipeline(true);
    if (localStorage.getItem('crm_auto_on') === '1') startAutoEngine();
  }, 300);
}

async function sendEmail(leadId) {
  const to      = document.getElementById('compose-to')?.value.trim();
  const subject = document.getElementById('compose-subject')?.value.trim();
  const html    = document.getElementById('compose-body')?.innerHTML || '';

  if (!to || !subject) { toast('❌ To and Subject are required'); return; }

  const btn = document.querySelector('#modal-footer .btn-primary');
  if (btn) { btn.textContent = '⏳ Sending…'; btn.disabled = true; }

  try {
    const res = await fetch(SEND_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, subject, html })
    });
    const data = await res.json();

    if (res.ok && data.success) {
      const lead = leads.find(l => l.id === leadId);
      if (lead) {
        lead.emailSent   = true;
        lead.lastContact = new Date().toISOString();
        if (lead.status === 'New Lead') lead.status = 'Contacted';
        saveLeads();
        log('email', `Email sent to ${lead.company} (${to})`, 'green');
      }
      closeModal();
      updateSidebar();
      toast(`✅ Email sent to ${to}`);
      if (currentView === 'leads' || currentView === 'emails') showView(currentView);
    } else {
      toast('❌ ' + (data.error || 'Send failed'));
      if (btn) { btn.textContent = '📨 Send Email'; btn.disabled = false; }
    }
  } catch(e) {
    toast('❌ Network error — check connection');
    if (btn) { btn.textContent = '📨 Send Email'; btn.disabled = false; }
  }
}

  const l = leads.find(x=>x.id===id);
  if(!l) return;
  l[field] = val;
  if(field==='emailSent' && val) l.lastContact = new Date().toISOString();
  log('email', `${l.company}: ${field.replace('email','')} = ${val}`, val?'green':'');
  saveLeads();
  toast(l.company + ' email status updated');
}

function renderGenerator(c) {
  const today = new Date().toLocaleDateString();
  const lastGen = localStorage.getItem('crm_last_gen');
  const genLeads = JSON.parse(localStorage.getItem('crm_gen_today') || '[]');
  const alreadyGen = lastGen === today && genLeads.length > 0;

  c.innerHTML = `
  <div class="gen-card">
    <h3>Daily Lead Generator</h3>
    <p style="font-size:13px;color:#64748b;margin-bottom:16px">Generates 10–15 fresh B2B leads daily from the pool of ${GENERATOR_POOL.length} verified companies. Run once per day for best results.</p>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-primary" onclick="generateLeads()" ${alreadyGen?'disabled':''}>
        ${alreadyGen ? '✓ Generated Today' : '⚡ Generate Today\'s Leads'}
      </button>
      ${alreadyGen ? '<span style="font-size:12px;color:#16a34a">'+genLeads.length+' leads generated today</span>' : ''}
    </div>
  </div>
  <div id="gen-results">
    ${alreadyGen ? renderGenResults(genLeads) : '<div class="gen-card"><div class="empty-state">Click the button to generate fresh leads for today</div></div>'}
  </div>`;
}

function renderGenResults(genLeads) {
  return `<div class="gen-card">
    <h3>Today's Generated Leads (${new Date().toLocaleDateString()})</h3>
    ${genLeads.map(l=>`
      <div class="gen-result-row">
        <span class="company">${l.company}</span>
        <span class="meta">${l.category} · ${l.country} · ${l.contact}</span>
        <span class="score-badge ${l.leadScore>=85?'score-high':l.leadScore>=70?'score-med':'score-low'}" style="margin-right:6px">${l.leadScore}</span>
        <span style="font-size:12px;color:#64748b;margin-right:8px">${l.opportunitySize}</span>
        ${leads.find(x=>x.company===l.company) ?
          '<span style="font-size:12px;color:#16a34a">✓ In CRM</span>' :
          `<button class="btn btn-success btn-sm" onclick="addGenLead('${l.company}')">+ Add to CRM</button>`}
      </div>`).join('')}
  </div>`;
}

function generateLeads() {
  const today = new Date().toLocaleDateString();
  // Pick 12 random from pool, excluding already added companies
  const existingCompanies = leads.map(l=>l.company);
  const pool = GENERATOR_POOL.filter(l=>!existingCompanies.includes(l.company));
  if(pool.length === 0) { toast('All pool leads already in CRM!'); return; }
  const count = Math.min(12, pool.length);
  const shuffled = [...pool].sort(()=>Math.random()-.5).slice(0, count);

  localStorage.setItem('crm_last_gen', today);
  localStorage.setItem('crm_gen_today', JSON.stringify(shuffled));
  log('generator', `Generated ${count} new leads for ${today}`, 'purple');
  updateSidebar();
  document.getElementById('gen-results').innerHTML = renderGenResults(shuffled);
  document.querySelector('#content .gen-card .btn').disabled = true;
  document.querySelector('#content .gen-card .btn').textContent = '✓ Generated Today';
  toast(`${count} leads generated!`);
}

function addGenLead(company) {
  const genLeads = JSON.parse(localStorage.getItem('crm_gen_today') || '[]');
  const l = genLeads.find(x=>x.company===company);
  if(!l) return;
  const newId = Math.max(...leads.map(x=>x.id)) + 1;
  const newLead = {
    ...l, id: newId, wave: 4, status: 'New Lead', notes: 'Generated via Daily Generator',
    activities: [], emailSent: false, emailOpened: false, emailReplied: false, emailBounced: false,
    lastContact: null, createdAt: new Date().toISOString(), linkedin: l.linkedin || ''
  };
  leads.push(newLead);
  saveLeads();
  log('generator', `Added ${company} to CRM from daily generator`, 'green');
  toast(`${company} added to CRM!`);
  updateSidebar();
  const genLeads2 = JSON.parse(localStorage.getItem('crm_gen_today') || '[]');
  document.getElementById('gen-results').innerHTML = renderGenResults(genLeads2);
}

// ===================== ANALYTICS =====================
function renderAnalytics(c) {
  c.innerHTML = `
  <div class="charts-grid">
    <div class="chart-card"><h3>Win/Loss Rate</h3><canvas id="winChart"></canvas></div>
    <div class="chart-card"><h3>Category Performance</h3><canvas id="perfChart"></canvas></div>
    <div class="chart-card"><h3>Lead Score by Wave</h3><canvas id="waveChart"></canvas></div>
    <div class="chart-card"><h3>Opportunity Size Spread</h3><canvas id="oppChart"></canvas></div>
  </div>
  <div class="card" style="margin-top:16px">
    <div class="card-header"><h3>Top 20 Leads by Score</h3></div>
    <table>
      <thead><tr><th>Rank</th><th>Company</th><th>Category</th><th>Score</th><th>Opportunity</th><th>Status</th></tr></thead>
      <tbody>${[...leads].sort((a,b)=>b.leadScore-a.leadScore).slice(0,20).map((l,i)=>`
        <tr>
          <td style="font-weight:700;color:#6366f1">#${i+1}</td>
          <td style="font-weight:600">${l.company}</td>
          <td>${l.category}</td>
          <td><span class="score-badge score-high">${l.leadScore}</span></td>
          <td style="font-size:12px;color:#64748b">${l.opportunitySize}</td>
          <td><span class="badge ${STATUS_BADGE[l.status]||'badge-new'}">${l.status}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  // Win/Loss
  const won = leads.filter(l=>l.status==='Closed Won').length;
  const lost = leads.filter(l=>l.status==='Closed Lost').length;
  const open = leads.length - won - lost;
  charts.win = new Chart(document.getElementById('winChart'), {
    type:'pie', data:{labels:['Won','Lost','Open'],datasets:[{data:[won,lost,open],backgroundColor:['#16a34a','#ef4444','#3b82f6'],borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom'}},responsive:true,maintainAspectRatio:true}
  });

  // Category perf — avg score per category
  const catScores = {};
  const catCount2 = {};
  leads.forEach(l=>{
    catScores[l.category]=(catScores[l.category]||0)+l.leadScore;
    catCount2[l.category]=(catCount2[l.category]||0)+1;
  });
  const cats2 = Object.keys(catScores).sort((a,b)=>(catScores[b]/catCount2[b])-(catScores[a]/catCount2[a])).slice(0,8);
  charts.perf = new Chart(document.getElementById('perfChart'), {
    type:'bar',
    data:{labels:cats2.map(c=>c.length>12?c.slice(0,12)+'…':c),datasets:[{data:cats2.map(c=>Math.round(catScores[c]/catCount2[c])),backgroundColor:'#6366f1',borderRadius:4,label:'Avg Score'}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,min:60,grid:{color:'#f1f5f9'}}},responsive:true,maintainAspectRatio:true}
  });

  // Wave scores
  const waveAvg = [1,2,3,4].map(w=>{
    const wl = leads.filter(l=>l.wave===w);
    return wl.length ? Math.round(wl.reduce((s,l)=>s+l.leadScore,0)/wl.length) : 0;
  });
  charts.wave = new Chart(document.getElementById('waveChart'), {
    type:'bar', data:{labels:['Wave 1','Wave 2','Wave 3','Daily Gen'],datasets:[{data:waveAvg,backgroundColor:['#f59e0b','#3b82f6','#10b981','#8b5cf6'],borderRadius:4}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,min:50,grid:{color:'#f1f5f9'}}},responsive:true,maintainAspectRatio:true}
  });

  // Opportunity spread
  const bands = {'<$50K':0,'$50K–$100K':0,'$100K–$200K':0,'$200K+':0};
  leads.forEach(l=>{
    const low = parseInt((l.opportunitySize||'0').replace(/[^0-9]/g,''));
    if(low>=200) bands['$200K+']++;
    else if(low>=100) bands['$100K–$200K']++;
    else if(low>=50) bands['$50K–$100K']++;
    else bands['<$50K']++;
  });
  charts.opp = new Chart(document.getElementById('oppChart'), {
    type:'doughnut', data:{labels:Object.keys(bands),datasets:[{data:Object.values(bands),backgroundColor:['#fca5a5','#fde68a','#86efac','#34d399'],borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom'}},responsive:true,maintainAspectRatio:true}
  });
}

// ===================== EXPORT =====================
function exportCSV() {
  const headers = ['ID','Company','Website','Industry','Country','Category','Contact','Email','LinkedIn','Score','Opportunity','Status','Wave','Sent','Opened','Replied','Last Contact','Notes'];
  const rows = leads.map(l=>[l.id,l.company,l.website,l.industry,l.country,l.category,l.contact,l.email,l.linkedin||'',l.leadScore,l.opportunitySize,l.status,l.wave,l.emailSent?'Y':'N',l.emailOpened?'Y':'N',l.emailReplied?'Y':'N',l.lastContact?new Date(l.lastContact).toLocaleDateString():'',l.notes||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `leads_crm_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  log('export', `Exported ${leads.length} leads to CSV`, 'green');
  toast(`Exported ${leads.length} leads`);
}

  rule3: true,  // emailBounced → Nurture
  rule4: true,  // stale 14d no reply → Nurture
  rule5: true,  // Replied + no follow-up 7d → Meeting Booked nudge
  rule6: true,  // auto daily lead gen at midnight
  rule7: false  // auto-mark Wave 1 emails as opened after 48h (simulate)
}));

function saveRules() { localStorage.setItem('crm_auto_rules', JSON.stringify(autoRules)); }

function alog(msg, type='') {
  const time = new Date().toLocaleTimeString();
  autoLog.unshift({msg, type, time});
  if(autoLog.length > 100) autoLog.pop();
  const box = document.getElementById('auto-run-log');
  if(box) {
    const cls = type==='green'?'al-green':type==='yellow'?'al-yellow':type==='red'?'al-red':type==='blue'?'al-blue':'';
    box.innerHTML = `<div class="al-line ${cls}">[${time}] ${msg}</div>` + box.innerHTML;
  }
}

function runAutoPipeline(silent=false) {
  let moved = 0;
  const now = Date.now();

  leads.forEach(l => {
    const prev = l.status;

    // Rule 1 — emailSent → Contacted
    if(autoRules.rule1 && l.emailSent && l.status === 'New Lead') {
      l.status = 'Contacted';
      l.lastContact = l.lastContact || new Date().toISOString();
    }

    // Rule 2 — emailReplied → Replied
    if(autoRules.rule2 && l.emailReplied && ['New Lead','Contacted'].includes(l.status)) {
      l.status = 'Replied';
      l.lastContact = new Date().toISOString();
    }

    // Rule 3 — emailBounced → Nurture
    if(autoRules.rule3 && l.emailBounced && ['New Lead','Contacted'].includes(l.status)) {
      l.status = 'Nurture';
    }

    // Rule 4 — Contacted 14+ days with no reply → Nurture
    if(autoRules.rule4 && l.status === 'Contacted' && l.lastContact) {
      const daysSince = (now - new Date(l.lastContact).getTime()) / 86400000;
      if(daysSince >= 14 && !l.emailReplied) {
        l.status = 'Nurture';
      }
    }

    // Rule 5 — Replied 7+ days with no meeting → log nudge
    if(autoRules.rule5 && l.status === 'Replied' && l.lastContact) {
      const daysSince = (now - new Date(l.lastContact).getTime()) / 86400000;
      if(daysSince >= 7) {
        const alreadyNudged = (l.activities||[]).some(a=>a.text.includes('Auto-nudge'));
        if(!alreadyNudged) {
          l.activities = l.activities || [];
          l.activities.push({text:`Auto-nudge: ${l.company} replied ${Math.round(daysSince)}d ago — follow up for meeting`, color:'orange', time:new Date().toISOString()});
          log('auto', `Nudge: ${l.company} — ${Math.round(daysSince)}d since reply, no meeting booked`, 'orange');
          alog(`Nudge → ${l.company}: ${Math.round(daysSince)}d since reply`, 'yellow');
        }
      }
    }

    // Rule 7 — simulate Wave 1 opens after 48h
    if(autoRules.rule7 && l.wave===1 && l.emailSent && !l.emailOpened && l.lastContact) {
      const hrs = (now - new Date(l.lastContact).getTime()) / 3600000;
      if(hrs >= 48) l.emailOpened = true;
    }

    if(l.status !== prev) {
      moved++;
      const act = {text:`Auto-pipeline: ${prev} → ${l.status}`, color:'green', time:new Date().toISOString()};
      l.activities = l.activities || [];
      l.activities.push(act);
      log('auto', `${l.company}: ${prev} → ${l.status}`, 'green');
      alog(`${l.company}: ${prev} → ${l.status}`, 'green');
    }
  });

  // Rule 6 — auto daily lead gen at new day
  if(autoRules.rule6) {
    const today = new Date().toLocaleDateString();
    const lastGen = localStorage.getItem('crm_last_gen');
    if(lastGen !== today) {
      const existingCompanies = leads.map(l=>l.company);
      const pool = GENERATOR_POOL.filter(l=>!existingCompanies.includes(l.company));
      if(pool.length > 0) {
        const count = Math.min(12, pool.length);
        const newOnes = [...pool].sort(()=>Math.random()-.5).slice(0, count);
        localStorage.setItem('crm_last_gen', today);
        localStorage.setItem('crm_gen_today', JSON.stringify(newOnes));
        alog(`Daily gen: ${count} new leads ready for ${today}`, 'blue');
        log('generator', `Auto-generated ${count} new leads for ${today}`, 'purple');
        updateSidebar();
      }
    }
  }

  if(moved > 0) {
    saveLeads();
    if(!silent) toast(`Auto-pipeline: ${moved} lead${moved>1?'s':''} advanced`);
    alog(`Run complete — ${moved} lead${moved>1?'s':''} moved`, 'green');
  } else {
    if(!silent) alog('Run complete — no changes needed', '');
  }

  updateAutoStatus();
  return moved;
}

function startAutoEngine() {
  if(autoInterval) return;
  runAutoPipeline(true);
  autoInterval = setInterval(()=>runAutoPipeline(true), 2 * 60 * 1000); // every 2 min
  localStorage.setItem('crm_auto_on', '1');
  updateAutoStatus();
  alog('Engine started — running every 2 minutes', 'blue');
  toast('Automation engine started');
}

function stopAutoEngine() {
  if(autoInterval) { clearInterval(autoInterval); autoInterval = null; }
  localStorage.removeItem('crm_auto_on');
  updateAutoStatus();
  alog('Engine stopped', 'yellow');
  toast('Automation engine stopped');
}

  if(dot) { dot.className = 'status-dot ' + (on?'on pulse':'off'); }
  if(lbl) lbl.textContent = on ? 'Auto-pipeline ON' : 'Automation off';
}

function exportJSON() {
  const data = {leads, activities, exportedAt: new Date().toISOString(), version: '1.0'};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `crm_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  log('export', 'Full JSON backup exported', 'green');
  toast('JSON backup saved!');
}

function importJSON(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.leads || !Array.isArray(data.leads)) { toast('Invalid backup file'); return; }
      if(!confirm(`Import ${data.leads.length} leads? This will REPLACE current data.`)) return;
      leads = data.leads;
      activities = data.activities || [];
      saveLeads(); saveActivities();
      updateSidebar();
      log('import', `Imported ${leads.length} leads from backup`, 'green');
      toast(`Imported ${leads.length} leads!`);
      showView('dashboard');
    } catch(err) { toast('Error reading file: ' + err.message); }
  };
  reader.readAsText(file);
}

function fmtTime(iso) {
  if(!iso) return '';
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  if(diff < 60000) return 'just now';
  if(diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if(diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
