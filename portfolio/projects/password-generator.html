<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Password Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a12;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column}
.top-bar{background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.08);padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between}
.top-bar a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.85rem}
.top-bar a:hover{color:#fff}
.top-bar h1{font-size:1rem;font-weight:700}
.app{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#111128;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:2.5rem;width:100%;max-width:480px}
h2{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:.4rem}
.sub{text-align:center;color:#64748b;font-size:.875rem;margin-bottom:2rem}
.output-wrap{position:relative;margin-bottom:1.5rem}
.output{width:100%;background:#0a0a12;border:2px solid rgba(124,58,237,.4);border-radius:12px;padding:1rem 3.5rem 1rem 1.2rem;font-size:1.1rem;font-family:'Courier New',monospace;color:#a855f7;font-weight:700;letter-spacing:.08em;word-break:break-all;min-height:60px;outline:none;resize:none}
.copy-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:#a855f7;border-radius:8px;padding:.4rem .6rem;cursor:pointer;font-size:1rem;transition:background .2s}
.copy-btn:hover{background:rgba(124,58,237,.4)}
.copy-btn.copied{background:#22c55e;border-color:#22c55e;color:#fff}
.strength-bar{height:6px;border-radius:99px;background:#1e1e40;margin-bottom:.4rem;overflow:hidden}
.strength-fill{height:100%;border-radius:99px;transition:width .3s,background .3s}
.strength-label{font-size:.75rem;color:#64748b;margin-bottom:1.5rem}
.section{margin-bottom:1.2rem}
.section label{display:flex;align-items:center;justify-content:space-between;font-size:.85rem;font-weight:600;color:#94a3b8;margin-bottom:.6rem}
.section label span{color:#f1f5f9;font-weight:700}
input[type=range]{width:100%;accent-color:#7c3aed;cursor:pointer}
.toggles{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.toggle{display:flex;align-items:center;gap:.6rem;background:#0a0a12;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.7rem .9rem;cursor:pointer;transition:border-color .2s}
.toggle:hover{border-color:rgba(124,58,237,.4)}
.toggle.on{border-color:rgba(124,58,237,.6);background:rgba(124,58,237,.08)}
.toggle input{display:none}
.toggle-box{width:16px;height:16px;border-radius:4px;border:2px solid #334155;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s}
.toggle.on .toggle-box{background:#7c3aed;border-color:#7c3aed}
.toggle-label{font-size:.8rem;font-weight:600;color:#94a3b8}
.toggle.on .toggle-label{color:#f1f5f9}
.gen-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;color:#fff;padding:.9rem;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:1rem;transition:opacity .2s;letter-spacing:.02em}
.gen-btn:hover{opacity:.85}
.presets{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.preset{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;padding:.3rem .7rem;border-radius:99px;font-size:.75rem;cursor:pointer;font-weight:600;transition:all .2s}
.preset:hover{border-color:#7c3aed;color:#a855f7}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../index.html">← Portfolio</a>
  <h1>🔐 Password Generator</h1>
  <span style="font-size:.75rem;color:#64748b">100% client-side</span>
</div>
<div class="app">
  <div class="card">
    <h2>Password Generator</h2>
    <p class="sub">Generate strong, secure passwords instantly</p>

    <div class="output-wrap">
      <textarea class="output" id="output" rows="2" readonly></textarea>
      <button class="copy-btn" id="copy-btn" onclick="copyPwd()" title="Copy">📋</button>
    </div>

    <div class="strength-bar"><div class="strength-fill" id="sfill"></div></div>
    <div class="strength-label" id="slabel">Strength: —</div>

    <div class="presets">
      <button class="preset" onclick="applyPreset('pin')">PIN (6 digits)</button>
      <button class="preset" onclick="applyPreset('wifi')">WiFi Password</button>
      <button class="preset" onclick="applyPreset('strong')">Strong (32)</button>
      <button class="preset" onclick="applyPreset('memorable')">Memorable</button>
    </div>

    <div class="section">
      <label>Length <span id="len-label">16</span></label>
      <input type="range" id="length" min="4" max="64" value="16" oninput="document.getElementById('len-label').textContent=this.value;generate()"/>
    </div>

    <div class="section">
      <label style="margin-bottom:.75rem">Character Types</label>
      <div class="toggles">
        <label class="toggle on" id="t-upper" onclick="tog('upper')">
          <div class="toggle-box">✓</div>
          <span class="toggle-label">Uppercase A-Z</span>
        </label>
        <label class="toggle on" id="t-lower" onclick="tog('lower')">
          <div class="toggle-box">✓</div>
          <span class="toggle-label">Lowercase a-z</span>
        </label>
        <label class="toggle on" id="t-num" onclick="tog('num')">
          <div class="toggle-box">✓</div>
          <span class="toggle-label">Numbers 0-9</span>
        </label>
        <label class="toggle on" id="t-sym" onclick="tog('sym')">
          <div class="toggle-box">✓</div>
          <span class="toggle-label">Symbols !@#$</span>
        </label>
      </div>
    </div>

    <button class="gen-btn" onclick="generate()">⚡ Generate New Password</button>
  </div>
</div>
<script>
const state={upper:true,lower:true,num:true,sym:true};
const chars={upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',lower:'abcdefghijklmnopqrstuvwxyz',num:'0123456789',sym:'!@#$%^&*()_+-=[]{}|;:,.<>?'};
function tog(k){
  state[k]=!state[k];
  const el=document.getElementById('t-'+k);
  el.classList.toggle('on',state[k]);
  el.querySelector('.toggle-box').textContent=state[k]?'✓':'';
  generate();
}
function generate(){
  let pool='';
  Object.keys(state).forEach(k=>{if(state[k])pool+=chars[k];});
  if(!pool)pool=chars.lower;
  const len=+document.getElementById('length').value;
  let pwd='';
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  arr.forEach(v=>pwd+=pool[v%pool.length]);
  document.getElementById('output').value=pwd;
  strength(pwd);
}
function strength(p){
  let s=0;
  if(p.length>=8)s+=20;if(p.length>=12)s+=20;if(p.length>=20)s+=10;
  if(/[A-Z]/.test(p))s+=15;if(/[a-z]/.test(p))s+=15;
  if(/[0-9]/.test(p))s+=10;if(/[^A-Za-z0-9]/.test(p))s+=10;
  s=Math.min(s,100);
  const fill=document.getElementById('sfill');
  const label=document.getElementById('slabel');
  const colors=['#ef4444','#f97316','#eab308','#22c55e','#6366f1'];
  const labels=['Very Weak','Weak','Fair','Strong','Very Strong'];
  const idx=Math.floor(s/25);
  fill.style.width=s+'%';
  fill.style.background=colors[Math.min(idx,4)];
  label.textContent='Strength: '+labels[Math.min(idx,4)];
}
function copyPwd(){
  const val=document.getElementById('output').value;
  navigator.clipboard.writeText(val).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='✅';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋';btn.classList.remove('copied');},1500);
  });
}
function applyPreset(p){
  const l=document.getElementById('length');
  const presets={
    pin:{len:6,upper:false,lower:false,num:true,sym:false},
    wifi:{len:20,upper:true,lower:true,num:true,sym:false},
    strong:{len:32,upper:true,lower:true,num:true,sym:true},
    memorable:{len:12,upper:true,lower:true,num:true,sym:false},
  };
  const pr=presets[p];
  l.value=pr.len;document.getElementById('len-label').textContent=pr.len;
  Object.keys(state).forEach(k=>{
    if(state[k]!==pr[k]){state[k]=pr[k];const el=document.getElementById('t-'+k);el.classList.toggle('on',pr[k]);el.querySelector('.toggle-box').textContent=pr[k]?'✓':'';}
  });
  generate();
}
generate();
</script>
</body>
</html>
