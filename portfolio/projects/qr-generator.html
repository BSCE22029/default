<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR Code Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a12;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column}
.top-bar{background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.08);padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between}
.top-bar a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.85rem}
.top-bar a:hover{color:#fff}
.top-bar h1{font-size:1rem;font-weight:700}
.app{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:820px;width:100%;align-items:start}
.card{background:#111128;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:2rem}
h2{font-size:1.1rem;font-weight:700;margin-bottom:1.5rem}
.field{margin-bottom:1.2rem}
label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:.5rem}
input,select,textarea{width:100%;background:#0a0a12;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.7rem 1rem;font-size:.9rem;color:#f1f5f9;font-family:inherit;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:#7c3aed}
textarea{resize:vertical;min-height:100px}
select{cursor:pointer}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#64748b;padding:.4rem .9rem;border-radius:99px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:rgba(124,58,237,.2);border-color:#7c3aed;color:#a855f7}
.color-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem}
.color-field{display:flex;align-items:center;gap:.75rem}
.color-field input[type=color]{width:40px;height:40px;border:none;border-radius:8px;cursor:pointer;background:none;padding:0}
.color-label{font-size:.8rem;color:#94a3b8}
.gen-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;color:#fff;padding:.85rem;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
.gen-btn:hover{opacity:.85}
.qr-card{display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.qr-box{width:220px;height:220px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:12px}
.qr-box img{width:100%;height:100%;border-radius:8px}
.qr-placeholder{color:#334155;font-size:5rem;text-align:center}
.download-btn{background:#22c55e;color:#fff;border:none;padding:.7rem 1.5rem;border-radius:10px;font-size:.875rem;font-weight:700;cursor:pointer;transition:opacity .2s;text-decoration:none;display:inline-block}
.download-btn:hover{opacity:.85}
.download-btn.disabled{background:#334155;cursor:not-allowed;opacity:.6}
.hint{font-size:.75rem;color:#475569;text-align:center}
@media(max-width:640px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../index.html">← Portfolio</a>
  <h1>📱 QR Code Generator</h1>
  <span style="font-size:.75rem;color:#64748b">Free, no signup</span>
</div>
<div class="app">
  <div class="wrap">
    <div class="card">
      <h2>Generate QR Code</h2>
      <div class="tabs">
        <button class="tab active" onclick="setTab('url',this)">URL</button>
        <button class="tab" onclick="setTab('text',this)">Text</button>
        <button class="tab" onclick="setTab('email',this)">Email</button>
        <button class="tab" onclick="setTab('phone',this)">Phone</button>
        <button class="tab" onclick="setTab('wifi',this)">WiFi</button>
      </div>

      <div id="tab-url">
        <div class="field"><label>Website URL</label><input id="url-input" value="https://moiz.dev" placeholder="https://example.com" oninput="autoGen()"/></div>
      </div>
      <div id="tab-text" style="display:none">
        <div class="field"><label>Text Content</label><textarea id="text-input" placeholder="Enter any text..." oninput="autoGen()"></textarea></div>
      </div>
      <div id="tab-email" style="display:none">
        <div class="field"><label>Email Address</label><input id="email-input" placeholder="hello@example.com" oninput="autoGen()"/></div>
        <div class="field"><label>Subject (optional)</label><input id="email-sub" placeholder="Subject line" oninput="autoGen()"/></div>
      </div>
      <div id="tab-phone" style="display:none">
        <div class="field"><label>Phone Number</label><input id="phone-input" placeholder="+1234567890" oninput="autoGen()"/></div>
      </div>
      <div id="tab-wifi" style="display:none">
        <div class="field"><label>Network Name (SSID)</label><input id="wifi-ssid" placeholder="MyWiFiNetwork" oninput="autoGen()"/></div>
        <div class="field"><label>Password</label><input id="wifi-pass" placeholder="password" oninput="autoGen()"/></div>
        <div class="field"><label>Security</label><select id="wifi-sec" onchange="autoGen()"><option>WPA</option><option>WEP</option><option value="">None</option></select></div>
      </div>

      <div class="color-row">
        <div class="color-field"><input type="color" id="fg-color" value="#000000" oninput="autoGen()"/><div class="color-label">Foreground</div></div>
        <div class="color-field"><input type="color" id="bg-color" value="#ffffff" oninput="autoGen()"/><div class="color-label">Background</div></div>
      </div>
      <div class="field"><label>Size</label>
        <select id="qr-size" onchange="autoGen()">
          <option value="150">Small (150×150)</option>
          <option value="200" selected>Medium (200×200)</option>
          <option value="300">Large (300×300)</option>
          <option value="500">XL (500×500)</option>
        </select>
      </div>
      <button class="gen-btn" onclick="generate()">Generate QR Code</button>
    </div>

    <div class="card qr-card">
      <h2 style="align-self:flex-start">Your QR Code</h2>
      <div class="qr-box" id="qr-box">
        <div class="qr-placeholder">📱</div>
      </div>
      <a id="dl-btn" class="download-btn disabled" download="qrcode.png">⬇️ Download PNG</a>
      <p class="hint" id="qr-hint">Enter your content and click Generate</p>
    </div>
  </div>
</div>
<script>
let currentTab='url';
function setTab(t,btn){
  currentTab=t;
  document.querySelectorAll('[id^=tab-]').forEach(el=>el.style.display='none');
  document.getElementById('tab-'+t).style.display='block';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  autoGen();
}
function getData(){
  switch(currentTab){
    case 'url': return document.getElementById('url-input').value||'https://moiz.dev';
    case 'text': return document.getElementById('text-input').value||'Hello World';
    case 'email':{const e=document.getElementById('email-input').value;const s=document.getElementById('email-sub').value;return `mailto:${e}${s?'?subject='+encodeURIComponent(s):''}`;};
    case 'phone': return `tel:${document.getElementById('phone-input').value}`;
    case 'wifi':{const s=document.getElementById('wifi-ssid').value;const p=document.getElementById('wifi-pass').value;const sec=document.getElementById('wifi-sec').value;return `WIFI:T:${sec};S:${s};P:${p};;`;};
  }
}
function generate(){
  const data=getData();
  if(!data.trim()){return;}
  const size=document.getElementById('qr-size').value;
  const fg=document.getElementById('fg-color').value.replace('#','');
  const bg=document.getElementById('bg-color').value.replace('#','');
  const url=`https://api.qrserver.com/v1/create-qr-code/?data=${encodeURIComponent(data)}&size=${size}x${size}&color=${fg}&bgcolor=${bg}&margin=10`;
  const box=document.getElementById('qr-box');
  box.innerHTML='<div style="color:#7c3aed;font-size:2rem">⏳</div>';
  const img=new Image();
  img.onload=()=>{
    box.innerHTML='';box.appendChild(img);
    const dl=document.getElementById('dl-btn');
    dl.href=url;dl.classList.remove('disabled');
    document.getElementById('qr-hint').textContent='Right-click image or use Download button to save';
  };
  img.onerror=()=>{box.innerHTML='<div style="color:#ef4444">Failed — check connection</div>';};
  img.src=url;img.style.cssText='width:100%;height:100%;border-radius:8px';
}
let timer;function autoGen(){clearTimeout(timer);timer=setTimeout(generate,600);}
generate();
</script>
</body>
</html>
