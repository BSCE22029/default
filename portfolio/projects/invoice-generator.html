<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invoice Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.top-bar{background:#7c3aed;color:#fff;padding:.75rem 2rem;display:flex;align-items:center;justify-content:space-between}
.top-bar a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.85rem}
.top-bar a:hover{color:#fff}
.top-bar h1{font-size:1rem;font-weight:700}
.app{max-width:860px;margin:2rem auto;padding:0 1rem}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:2rem;margin-bottom:1.5rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.field{margin-bottom:1rem}
label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:.4rem}
input,select,textarea{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:.65rem .85rem;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:#7c3aed}
textarea{resize:vertical;min-height:60px}
h2{font-size:1rem;font-weight:700;color:#1e293b;margin-bottom:1.2rem;padding-bottom:.6rem;border-bottom:2px solid #f1f5f9}
.items-table{width:100%;border-collapse:collapse;margin-bottom:1rem}
.items-table th{text-align:left;font-size:.75rem;font-weight:700;text-transform:uppercase;color:#64748b;padding:.5rem .75rem;background:#f8fafc;border:1px solid #e2e8f0}
.items-table td{padding:.5rem .5rem;border:1px solid #e2e8f0;vertical-align:middle}
.items-table td input{border:none;background:transparent;padding:.4rem .5rem;font-size:.875rem}
.items-table td input:focus{background:#f8fafc;border-radius:4px}
.del-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:1.1rem;padding:.2rem .5rem}
.add-btn{background:none;border:1px dashed #7c3aed;color:#7c3aed;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;margin-bottom:1rem;transition:background .2s}
.add-btn:hover{background:rgba(124,58,237,.05)}
.totals{margin-left:auto;width:260px}
.total-row{display:flex;justify-content:space-between;padding:.4rem 0;font-size:.875rem;color:#475569}
.total-row.grand{font-size:1rem;font-weight:700;color:#1e293b;border-top:2px solid #e2e8f0;padding-top:.75rem;margin-top:.25rem}
.actions{display:flex;gap:1rem;justify-content:flex-end;margin-top:1.5rem}
.btn{padding:.7rem 1.5rem;border-radius:9px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-print{background:#7c3aed;color:#fff}
.btn-clear{background:#f1f5f9;color:#475569}
.status-select{border:1px solid #e2e8f0;border-radius:8px;padding:.3rem .6rem;font-size:.75rem;font-weight:700;cursor:pointer}
@media print{
  .top-bar,.actions,.add-btn,.del-btn{display:none!important}
  body{background:#fff}
  .app{margin:0;max-width:100%}
  .card{box-shadow:none;border-radius:0}
}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../index.html">← Back to Portfolio</a>
  <h1>🧾 Invoice Generator</h1>
  <span style="font-size:.8rem;opacity:.7">Fill in → Print / Save PDF</span>
</div>
<div class="app">
  <div class="card">
    <div class="row">
      <div>
        <h2>Your Business</h2>
        <div class="field"><label>Business Name</label><input id="biz" value="Moiz Ahmad Dev"/></div>
        <div class="field"><label>Address</label><textarea id="biz-addr" rows="2">Lahore, Pakistan</textarea></div>
        <div class="field"><label>Email</label><input id="biz-email" value="mohsinrazaojla32@gmail.com"/></div>
      </div>
      <div>
        <h2>Client Details</h2>
        <div class="field"><label>Client Name</label><input id="cli"/></div>
        <div class="field"><label>Client Address</label><textarea id="cli-addr" rows="2"></textarea></div>
        <div class="field"><label>Client Email</label><input id="cli-email" type="email"/></div>
      </div>
    </div>
    <div class="row3">
      <div class="field"><label>Invoice #</label><input id="inv-num" value="INV-001"/></div>
      <div class="field"><label>Issue Date</label><input id="inv-date" type="date"/></div>
      <div class="field"><label>Due Date</label><input id="due-date" type="date"/></div>
    </div>
    <div class="row">
      <div class="field"><label>Status</label>
        <select class="status-select" id="status">
          <option value="UNPAID" style="color:#ef4444">UNPAID</option>
          <option value="PAID" style="color:#22c55e">PAID</option>
          <option value="PENDING">PENDING</option>
        </select>
      </div>
      <div class="field"><label>Currency</label>
        <select id="currency">
          <option value="$">USD ($)</option>
          <option value="€">EUR (€)</option>
          <option value="£">GBP (£)</option>
          <option value="PKR ">PKR</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Line Items</h2>
    <table class="items-table">
      <thead><tr><th style="width:40%">Description</th><th style="width:15%">Qty</th><th style="width:20%">Unit Price</th><th style="width:20%">Total</th><th style="width:5%"></th></tr></thead>
      <tbody id="items-body"></tbody>
    </table>
    <button class="add-btn" onclick="addRow()">+ Add Item</button>
    <div class="totals">
      <div class="total-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="total-row">
        <span>Tax (<input id="tax-rate" type="number" value="0" min="0" max="100" style="width:40px;border:none;border-bottom:1px solid #94a3b8;text-align:center;font-size:.875rem;padding:0" oninput="calc()">%)</span>
        <span id="tax-amt">$0.00</span>
      </div>
      <div class="total-row"><span>Discount</span><span>-<input id="discount" type="number" value="0" min="0" style="width:60px;border:none;border-bottom:1px solid #94a3b8;text-align:center;font-size:.875rem;padding:0" oninput="calc()"></span></div>
      <div class="total-row grand"><span>Total Due</span><span id="grand-total">$0.00</span></div>
    </div>
    <div class="field" style="margin-top:1.5rem"><label>Notes / Payment Terms</label><textarea id="notes" placeholder="e.g. Payment due within 14 days. Bank transfer to IBAN: ..."></textarea></div>
    <div class="actions">
      <button class="btn btn-clear" onclick="clearAll()">Clear</button>
      <button class="btn btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
  </div>
</div>
<script>
let rows=[];
function uid(){return Math.random().toString(36).slice(2,8)}
function addRow(desc='',qty=1,price=0){
  const id=uid();
  rows.push({id,desc,qty,price});
  render();
}
function render(){
  const sym=document.getElementById('currency').value;
  document.getElementById('items-body').innerHTML=rows.map(r=>`
    <tr>
      <td><input value="${r.desc}" oninput="upd('${r.id}','desc',this.value)" placeholder="Service description"/></td>
      <td><input type="number" value="${r.qty}" min="1" oninput="upd('${r.id}','qty',+this.value)" style="width:60px"/></td>
      <td><input type="number" value="${r.price}" min="0" step="0.01" oninput="upd('${r.id}','price',+this.value)" style="width:90px"/></td>
      <td style="font-weight:600">${sym}${(r.qty*r.price).toFixed(2)}</td>
      <td><button class="del-btn" onclick="del('${r.id}')">×</button></td>
    </tr>`).join('');
  calc();
}
function upd(id,k,v){const r=rows.find(x=>x.id===id);if(r){r[k]=v;calc();}}
function del(id){rows=rows.filter(x=>x.id!==id);render();}
function calc(){
  const sym=document.getElementById('currency').value;
  const sub=rows.reduce((a,r)=>a+r.qty*r.price,0);
  const tax=sub*(+(document.getElementById('tax-rate').value||0)/100);
  const disc=+(document.getElementById('discount').value||0);
  const grand=sub+tax-disc;
  document.getElementById('subtotal').textContent=sym+sub.toFixed(2);
  document.getElementById('tax-amt').textContent=sym+tax.toFixed(2);
  document.getElementById('grand-total').textContent=sym+Math.max(0,grand).toFixed(2);
}
function clearAll(){
  rows=[];
  ['cli','cli-addr','cli-email','notes'].forEach(id=>document.getElementById(id).value='');
  render();
}
// Init
const today=new Date();
const due=new Date();due.setDate(due.getDate()+14);
document.getElementById('inv-date').value=today.toISOString().slice(0,10);
document.getElementById('due-date').value=due.toISOString().slice(0,10);
addRow('Web Development Services',1,500);
addRow('Domain & Hosting Setup',1,50);
document.getElementById('currency').addEventListener('change',render);
</script>
</body>
</html>
